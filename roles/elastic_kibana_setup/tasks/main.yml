---
# tasks/main.yml for elastic_kibana_setup
# Deploy and configure Kibana spaces and dashboards

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - elastic_kibana_setup_host is defined
    fail_msg: "elastic_kibana_setup_host must be defined"
    quiet: true

- name: Execute elastic kibana setup
  ansible.builtin.debug:
    msg: >-
      Deploy and configure Kibana spaces and dashboards.
      Target: {{ elastic_kibana_setup_host }}
