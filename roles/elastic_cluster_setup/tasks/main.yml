---
# tasks/main.yml for elastic_cluster_setup
# Deploy multi-node Elasticsearch cluster

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - elastic_cluster_setup_host is defined
    fail_msg: "elastic_cluster_setup_host must be defined"
    quiet: true

- name: Execute elastic cluster setup
  ansible.builtin.debug:
    msg: >-
      Deploy multi-node Elasticsearch cluster.
      Target: {{ elastic_cluster_setup_host }}
