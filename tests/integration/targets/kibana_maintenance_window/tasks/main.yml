---
# Integration tests for stevefulme1.elastic.kibana_maintenance_window
# These tests verify full CRUD lifecycle with idempotency and check_mode.
# A live Kibana API endpoint is required.
- name: Set test variables
  ansible.builtin.set_fact:
    test_mw_params:
      state: present
      title: "Integration Test Maintenance Window"
      duration: 3600000
      r_rule:
        dtstart: "2025-06-01T00:00:00.000Z"
        tzid: "UTC"
        freq: 0
      category_ids:
        - observability
# ============================================================
# CREATE - check mode
# ============================================================
- name: Create maintenance window (check mode)  # noqa: args[module]
  stevefulme1.elastic.kibana_maintenance_window:
    state: present
  args: "{{ test_mw_params }}"
  check_mode: true
  register: create_check
- name: Assert create in check mode reports changed
  ansible.builtin.assert:
    that:
      - create_check is changed
    fail_msg: "Create in check mode should report changed=true"
# ============================================================
# CREATE - real
# ============================================================
- name: Create maintenance window  # noqa: args[module]
  stevefulme1.elastic.kibana_maintenance_window:
    state: present
  args: "{{ test_mw_params }}"
  register: create_result
- name: Assert create reports changed
  ansible.builtin.assert:
    that:
      - create_result is changed
    fail_msg: "Create should report changed=true"
- name: Record created resource identifier
  ansible.builtin.set_fact:
    created_id: "{{ create_result.id }}"
# ============================================================
# CREATE - idempotency
# ============================================================
- name: Create maintenance window again (idempotency)  # noqa: args[module]
  stevefulme1.elastic.kibana_maintenance_window:
    window_id: "{{ created_id }}"
  args: "{{ test_mw_params }}"
  register: create_idempotent
- name: Assert create is idempotent
  ansible.builtin.assert:
    that:
      - create_idempotent is not changed
    fail_msg: "Repeated create with same params should report changed=false"
# ============================================================
# READ - verify created resource
# ============================================================
- name: Get maintenance window info  # noqa: args[module]
  stevefulme1.elastic.kibana_maintenance_window_info:
    window_id: "{{ created_id }}"
  register: info_result
- name: Assert resource exists
  ansible.builtin.assert:
    that:
      - info_result.kibana_maintenance_windows | length == 1
    fail_msg: "Created resource does not match expected values"
# ============================================================
# UPDATE
# ============================================================
- name: Update maintenance window  # noqa: args[module]
  stevefulme1.elastic.kibana_maintenance_window:
    window_id: "{{ created_id }}"
    title: "Updated Integration Test Window"
    duration: 7200000
    r_rule:
      dtstart: "2025-06-01T00:00:00.000Z"
      tzid: "UTC"
      freq: 0
    state: present
  register: update_result
- name: Assert update reports changed
  ansible.builtin.assert:
    that:
      - update_result is changed
    fail_msg: "Update should report changed=true"
# UPDATE - idempotency
- name: Update maintenance window again (idempotency)  # noqa: args[module]
  stevefulme1.elastic.kibana_maintenance_window:
    window_id: "{{ created_id }}"
    title: "Updated Integration Test Window"
    duration: 7200000
    r_rule:
      dtstart: "2025-06-01T00:00:00.000Z"
      tzid: "UTC"
      freq: 0
    state: present
  register: update_idempotent
- name: Assert update is idempotent
  ansible.builtin.assert:
    that:
      - update_idempotent is not changed
    fail_msg: "Repeated update with same params should report changed=false"
# ============================================================
# DELETE - check mode
# ============================================================
- name: Delete maintenance window (check mode)  # noqa: args[module]
  stevefulme1.elastic.kibana_maintenance_window:
    window_id: "{{ created_id }}"
    title: "unused"
    duration: 0
    r_rule:
      dtstart: "2025-01-01T00:00:00.000Z"
      tzid: "UTC"
      freq: 0
    state: absent
  check_mode: true
  register: delete_check
- name: Assert delete in check mode reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed
    fail_msg: "Delete in check mode should report changed=true"
- name: Verify maintenance window still exists after check mode delete  # noqa: args[module]
  stevefulme1.elastic.kibana_maintenance_window_info:
    window_id: "{{ created_id }}"
  register: delete_check_verify
- name: Assert resource still exists after check mode delete
  ansible.builtin.assert:
    that:
      - delete_check_verify.kibana_maintenance_windows | length == 1
    fail_msg: "Resource should still exist after check mode delete"
# ============================================================
# DELETE - real
# ============================================================
- name: Delete maintenance window  # noqa: args[module]
  stevefulme1.elastic.kibana_maintenance_window:
    window_id: "{{ created_id }}"
    title: "unused"
    duration: 0
    r_rule:
      dtstart: "2025-01-01T00:00:00.000Z"
      tzid: "UTC"
      freq: 0
    state: absent
  register: delete_result
- name: Assert delete reports changed
  ansible.builtin.assert:
    that:
      - delete_result is changed
    fail_msg: "Delete should report changed=true"
# DELETE - idempotency
- name: Delete maintenance window again (idempotency)  # noqa: args[module]
  stevefulme1.elastic.kibana_maintenance_window:
    window_id: "{{ created_id }}"
    title: "unused"
    duration: 0
    r_rule:
      dtstart: "2025-01-01T00:00:00.000Z"
      tzid: "UTC"
      freq: 0
    state: absent
  register: delete_idempotent
- name: Assert delete is idempotent
  ansible.builtin.assert:
    that:
      - delete_idempotent is not changed
    fail_msg: "Repeated delete should report changed=false"
