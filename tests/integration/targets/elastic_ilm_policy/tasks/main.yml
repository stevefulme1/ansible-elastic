---
# Integration tests for stevefulme1.elastic.elastic_ilm_policy
# These tests require valid credentials configured in integration_config.yml

- name: Create ILM policy (check_mode)
  stevefulme1.elastic.elastic_ilm_policy:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    policy_name: "ansible-test-{{ resource_prefix }}"
    policy:
      phases:
        hot:
          actions:
            rollover:
              max_size: 50gb
        delete:
          min_age: 90d
          actions:
            delete: {}
    state: present
    validate_certs: "{{ validate_certs | default(true) }}"
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed

- name: Create ILM policy
  stevefulme1.elastic.elastic_ilm_policy:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    policy_name: "ansible-test-{{ resource_prefix }}"
    policy:
      phases:
        hot:
          actions:
            rollover:
              max_size: 50gb
        delete:
          min_age: 90d
          actions:
            delete: {}
    state: present
    validate_certs: "{{ validate_certs | default(true) }}"
  register: create_result

- name: Verify ILM policy was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.ilm_policy is defined

- name: Create ILM policy again (idempotency)
  stevefulme1.elastic.elastic_ilm_policy:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    policy_name: "ansible-test-{{ resource_prefix }}"
    policy:
      phases:
        hot:
          actions:
            rollover:
              max_size: 50gb
        delete:
          min_age: 90d
          actions:
            delete: {}
    state: present
    validate_certs: "{{ validate_certs | default(true) }}"
  register: idem_result

- name: Verify idempotent create
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Delete ILM policy (check_mode)
  stevefulme1.elastic.elastic_ilm_policy:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    policy_name: "ansible-test-{{ resource_prefix }}"
    state: absent
    validate_certs: "{{ validate_certs | default(true) }}"
  check_mode: true
  register: delete_check

- name: Verify check_mode delete reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed

- name: Delete ILM policy
  stevefulme1.elastic.elastic_ilm_policy:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    policy_name: "ansible-test-{{ resource_prefix }}"
    state: absent
    validate_certs: "{{ validate_certs | default(true) }}"
  register: delete_result

- name: Verify ILM policy was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete ILM policy again (idempotent)
  stevefulme1.elastic.elastic_ilm_policy:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    policy_name: "ansible-test-{{ resource_prefix }}"
    state: absent
    validate_certs: "{{ validate_certs | default(true) }}"
  register: delete_idem

- name: Verify idempotent delete
  ansible.builtin.assert:
    that:
      - delete_idem is not changed
