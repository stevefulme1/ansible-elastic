---
# tasks/main.yml for elastic_data_stream_setup
# Configure data streams with ILM

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - elastic_data_stream_setup_host is defined
    fail_msg: "elastic_data_stream_setup_host must be defined"
    quiet: true

- name: Execute elastic data stream setup
  ansible.builtin.debug:
    msg: >-
      Configure data streams with ILM.
      Target: {{ elastic_data_stream_setup_host }}
