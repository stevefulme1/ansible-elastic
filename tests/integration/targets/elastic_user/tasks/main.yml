---
# Integration tests for stevefulme1.elastic.elastic_user
# These tests require valid credentials configured in integration_config.yml

- name: Create user (check_mode)
  stevefulme1.elastic.elastic_user:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed

- name: Create user
  stevefulme1.elastic.elastic_user:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: create_result

- name: Verify user was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.user is defined

- name: Create user again (idempotency)
  stevefulme1.elastic.elastic_user:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: idem_result

- name: Verify idempotent create
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Delete user (check_mode)
  stevefulme1.elastic.elastic_user:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    state: absent
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  check_mode: true
  register: delete_check

- name: Verify check_mode delete reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed

- name: Delete user
  stevefulme1.elastic.elastic_user:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    state: absent
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: delete_result

- name: Verify user was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete user again (idempotent)
  stevefulme1.elastic.elastic_user:
    host: "{{ elastic_host }}"
    api_key: "{{ elastic_api_key }}"
    state: absent
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: delete_idem

- name: Verify idempotent delete
  ansible.builtin.assert:
    that:
      - delete_idem is not changed
