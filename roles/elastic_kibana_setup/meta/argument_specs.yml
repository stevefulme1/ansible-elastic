---
argument_specs:
  main:
    short_description: "Deploy and configure Kibana spaces and dashboards"
    options:
      elastic_kibana_setup_host:
        description: Target host address
        type: str
        required: true
      elastic_kibana_setup_username:
        description: Authentication username
        type: str
      elastic_kibana_setup_password:
        description: Authentication password
        type: str
        no_log: true
      elastic_kibana_setup_api_key:
        description: API key for authentication
        type: str
        no_log: true
      elastic_kibana_setup_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      elastic_kibana_setup_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
