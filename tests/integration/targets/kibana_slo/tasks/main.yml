---
# Integration tests for stevefulme1.elastic.kibana_slo
# These tests verify full CRUD lifecycle with idempotency and check_mode.
# A live Kibana API endpoint is required.
- name: Set test variables
  ansible.builtin.set_fact:
    test_slo_params:
      state: present
      name: "Integration Test Availability SLO"
      description: "99% availability for integration tests"
      indicator:
        type: "sli.kql.custom"
        params:
          index: "logs-*"
          good: "status: 200"
          total: "*"
          timestampField: "@timestamp"
      time_window:
        duration: "30d"
        type: "rolling"
      budgeting_method: "occurrences"
      objective:
        target: 0.99
      tags:
        - integration-test
# ============================================================
# CREATE - check mode
# ============================================================
- name: Create SLO (check mode)  # noqa: args[module]
  stevefulme1.elastic.kibana_slo:
    state: present
  args: "{{ test_slo_params }}"
  check_mode: true
  register: create_check
- name: Assert create in check mode reports changed
  ansible.builtin.assert:
    that:
      - create_check is changed
    fail_msg: "Create in check mode should report changed=true"
# ============================================================
# CREATE - real
# ============================================================
- name: Create SLO  # noqa: args[module]
  stevefulme1.elastic.kibana_slo:
    state: present
  args: "{{ test_slo_params }}"
  register: create_result
- name: Assert create reports changed
  ansible.builtin.assert:
    that:
      - create_result is changed
    fail_msg: "Create should report changed=true"
- name: Record created resource identifier
  ansible.builtin.set_fact:
    created_id: "{{ create_result.id }}"
# ============================================================
# CREATE - idempotency
# ============================================================
- name: Create SLO again (idempotency)  # noqa: args[module]
  stevefulme1.elastic.kibana_slo:
    slo_id: "{{ created_id }}"
  args: "{{ test_slo_params }}"
  register: create_idempotent
- name: Assert create is idempotent
  ansible.builtin.assert:
    that:
      - create_idempotent is not changed
    fail_msg: "Repeated create with same params should report changed=false"
# ============================================================
# READ - verify created resource
# ============================================================
- name: Get SLO info  # noqa: args[module]
  stevefulme1.elastic.kibana_slo_info:
    slo_id: "{{ created_id }}"
  register: info_result
- name: Assert resource exists
  ansible.builtin.assert:
    that:
      - info_result.kibana_slos | length == 1
    fail_msg: "Created resource does not match expected values"
# ============================================================
# UPDATE
# ============================================================
- name: Update SLO  # noqa: args[module]
  stevefulme1.elastic.kibana_slo:
    slo_id: "{{ created_id }}"
    name: "Integration Test Availability SLO"
    description: "99.9% availability for integration tests"
    indicator:
      type: "sli.kql.custom"
      params:
        index: "logs-*"
        good: "status: 200"
        total: "*"
        timestampField: "@timestamp"
    time_window:
      duration: "30d"
      type: "rolling"
    budgeting_method: "occurrences"
    objective:
      target: 0.999
    tags:
      - integration-test
      - updated
    state: present
  register: update_result
- name: Assert update reports changed
  ansible.builtin.assert:
    that:
      - update_result is changed
    fail_msg: "Update should report changed=true"
# UPDATE - idempotency
- name: Update SLO again (idempotency)  # noqa: args[module]
  stevefulme1.elastic.kibana_slo:
    slo_id: "{{ created_id }}"
    name: "Integration Test Availability SLO"
    description: "99.9% availability for integration tests"
    indicator:
      type: "sli.kql.custom"
      params:
        index: "logs-*"
        good: "status: 200"
        total: "*"
        timestampField: "@timestamp"
    time_window:
      duration: "30d"
      type: "rolling"
    budgeting_method: "occurrences"
    objective:
      target: 0.999
    tags:
      - integration-test
      - updated
    state: present
  register: update_idempotent
- name: Assert update is idempotent
  ansible.builtin.assert:
    that:
      - update_idempotent is not changed
    fail_msg: "Repeated update with same params should report changed=false"
# ============================================================
# DELETE - check mode
# ============================================================
- name: Delete SLO (check mode)  # noqa: args[module]
  stevefulme1.elastic.kibana_slo:
    slo_id: "{{ created_id }}"
    state: absent
  check_mode: true
  register: delete_check
- name: Assert delete in check mode reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed
    fail_msg: "Delete in check mode should report changed=true"
- name: Verify SLO still exists after check mode delete  # noqa: args[module]
  stevefulme1.elastic.kibana_slo_info:
    slo_id: "{{ created_id }}"
  register: delete_check_verify
- name: Assert resource still exists after check mode delete
  ansible.builtin.assert:
    that:
      - delete_check_verify.kibana_slos | length == 1
    fail_msg: "Resource should still exist after check mode delete"
# ============================================================
# DELETE - real
# ============================================================
- name: Delete SLO  # noqa: args[module]
  stevefulme1.elastic.kibana_slo:
    slo_id: "{{ created_id }}"
    state: absent
  register: delete_result
- name: Assert delete reports changed
  ansible.builtin.assert:
    that:
      - delete_result is changed
    fail_msg: "Delete should report changed=true"
# DELETE - idempotency
- name: Delete SLO again (idempotency)  # noqa: args[module]
  stevefulme1.elastic.kibana_slo:
    slo_id: "{{ created_id }}"
    state: absent
  register: delete_idempotent
- name: Assert delete is idempotent
  ansible.builtin.assert:
    that:
      - delete_idempotent is not changed
    fail_msg: "Repeated delete should report changed=false"
