---
- name: "Elastic Alert Remediation"
  hosts: all
  sources:
    - stevefulme1.elastic.watcher_webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Critical alert - auto-remediate
      condition: >-
        event.elastic.severity is defined and
        event.elastic.severity == "critical"
      action:
        run_playbook:
          name: remediate.yml
          extra_vars:
            alert_host: "{{ event.elastic.host | default('') }}"
            alert_id: "{{ event.elastic.id | default('') }}"
            severity: "{{ event.elastic.severity }}"

    - name: Warning alert - notify
      condition: >-
        event.elastic.severity is defined and
        event.elastic.severity == "warning"
      action:
        print_event:
          pretty: true
