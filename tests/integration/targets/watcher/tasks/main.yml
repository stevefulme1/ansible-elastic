---
# Integration tests for stevefulme1.elastic.watcher
# These tests verify full CRUD lifecycle with idempotency and check_mode.
# A live Elasticsearch endpoint with Watcher (X-Pack) is required.
- name: Set test variables
  ansible.builtin.set_fact:
    test_watch_id: "integration_test_watch"
    test_watch_params:
      trigger:
        schedule:
          interval: "10s"
      input:
        search:
          request:
            indices:
              - "logs"
            body:
              query:
                match:
                  status: "error"
      condition:
        compare:
          ctx.payload.hits.total:
            gt: 0
      actions:
        log_error:
          logging:
            text: "Found errors in logs"
      active: true
    updated_watch_params:
      trigger:
        schedule:
          interval: "30s"
      input:
        search:
          request:
            indices:
              - "logs"
            body:
              query:
                match:
                  status: "error"
      condition:
        compare:
          ctx.payload.hits.total:
            gt: 0
      actions:
        log_error:
          logging:
            text: "Found errors in logs - updated"
      throttle_period: "5m"
      active: true
# ============================================================
# CREATE - check mode
# ============================================================
- name: Create watcher watch (check mode)
  stevefulme1.elastic.watcher:
    watch_id: "{{ test_watch_id }}"
    trigger: "{{ test_watch_params.trigger }}"
    input: "{{ test_watch_params.input }}"
    condition: "{{ test_watch_params.condition }}"
    actions: "{{ test_watch_params.actions }}"
    active: "{{ test_watch_params.active }}"
    state: present
  check_mode: true
  register: create_check
- name: Assert create in check mode reports changed
  ansible.builtin.assert:
    that:
      - create_check is changed
    fail_msg: "Create in check mode should report changed=true"
# ============================================================
# CREATE - real
# ============================================================
- name: Create watcher watch
  stevefulme1.elastic.watcher:
    watch_id: "{{ test_watch_id }}"
    trigger: "{{ test_watch_params.trigger }}"
    input: "{{ test_watch_params.input }}"
    condition: "{{ test_watch_params.condition }}"
    actions: "{{ test_watch_params.actions }}"
    active: "{{ test_watch_params.active }}"
    state: present
  register: create_result
- name: Assert create reports changed
  ansible.builtin.assert:
    that:
      - create_result is changed
    fail_msg: "Create should report changed=true"
- name: Record created resource identifier
  ansible.builtin.set_fact:
    created_id: "{{ test_watch_id }}"
# ============================================================
# CREATE - idempotency
# ============================================================
- name: Create watcher watch again (idempotency)
  stevefulme1.elastic.watcher:
    watch_id: "{{ created_id }}"
    trigger: "{{ test_watch_params.trigger }}"
    input: "{{ test_watch_params.input }}"
    condition: "{{ test_watch_params.condition }}"
    actions: "{{ test_watch_params.actions }}"
    active: "{{ test_watch_params.active }}"
    state: present
  register: create_idempotent
- name: Assert create is idempotent
  ansible.builtin.assert:
    that:
      - create_idempotent is not changed
    fail_msg: "Repeated create with same params should report changed=false"
# ============================================================
# READ - verify created resource
# ============================================================
- name: Get watcher watch info
  stevefulme1.elastic.watcher_info:
    id: "{{ created_id }}"
  register: info_result
- name: Assert resource exists
  ansible.builtin.assert:
    that:
      - info_result.watchers | length == 1
      - info_result.watchers[0]._id == created_id
    fail_msg: "Created watch does not match expected values"
# ============================================================
# UPDATE
# ============================================================
- name: Update watcher watch
  stevefulme1.elastic.watcher:
    watch_id: "{{ created_id }}"
    trigger: "{{ updated_watch_params.trigger }}"
    input: "{{ updated_watch_params.input }}"
    condition: "{{ updated_watch_params.condition }}"
    actions: "{{ updated_watch_params.actions }}"
    throttle_period: "{{ updated_watch_params.throttle_period }}"
    active: "{{ updated_watch_params.active }}"
    state: present
  register: update_result
- name: Assert update reports changed
  ansible.builtin.assert:
    that:
      - update_result is changed
    fail_msg: "Update should report changed=true"
# UPDATE - idempotency
- name: Update watcher watch again (idempotency)
  stevefulme1.elastic.watcher:
    watch_id: "{{ created_id }}"
    trigger: "{{ updated_watch_params.trigger }}"
    input: "{{ updated_watch_params.input }}"
    condition: "{{ updated_watch_params.condition }}"
    actions: "{{ updated_watch_params.actions }}"
    throttle_period: "{{ updated_watch_params.throttle_period }}"
    active: "{{ updated_watch_params.active }}"
    state: present
  register: update_idempotent
- name: Assert update is idempotent
  ansible.builtin.assert:
    that:
      - update_idempotent is not changed
    fail_msg: "Repeated update with same params should report changed=false"
# ============================================================
# DELETE - check mode
# ============================================================
- name: Delete watcher watch (check mode)
  stevefulme1.elastic.watcher:
    watch_id: "{{ created_id }}"
    state: absent
  check_mode: true
  register: delete_check
- name: Assert delete in check mode reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed
    fail_msg: "Delete in check mode should report changed=true"
- name: Verify watcher watch still exists after check mode delete
  stevefulme1.elastic.watcher_info:
    id: "{{ created_id }}"
  register: delete_check_verify
- name: Assert resource still exists after check mode delete
  ansible.builtin.assert:
    that:
      - delete_check_verify.watchers | length == 1
    fail_msg: "Resource should still exist after check mode delete"
# ============================================================
# DELETE - real
# ============================================================
- name: Delete watcher watch
  stevefulme1.elastic.watcher:
    watch_id: "{{ created_id }}"
    state: absent
  register: delete_result
- name: Assert delete reports changed
  ansible.builtin.assert:
    that:
      - delete_result is changed
    fail_msg: "Delete should report changed=true"
# DELETE - idempotency
- name: Delete watcher watch again (idempotency)
  stevefulme1.elastic.watcher:
    watch_id: "{{ created_id }}"
    state: absent
  register: delete_idempotent
- name: Assert delete is idempotent
  ansible.builtin.assert:
    that:
      - delete_idempotent is not changed
    fail_msg: "Repeated delete should report changed=false"
