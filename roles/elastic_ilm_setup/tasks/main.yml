---
# tasks/main.yml for elastic_ilm_setup
# Configure index lifecycle management pipeline

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - elastic_ilm_setup_host is defined
    fail_msg: "elastic_ilm_setup_host must be defined"
    quiet: true

- name: Execute elastic ilm setup
  ansible.builtin.debug:
    msg: >-
      Configure index lifecycle management pipeline.
      Target: {{ elastic_ilm_setup_host }}
