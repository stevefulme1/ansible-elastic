---
# tasks/main.yml for elastic_upgrade
# Rolling upgrade of Elasticsearch cluster

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - elastic_upgrade_host is defined
    fail_msg: "elastic_upgrade_host must be defined"
    quiet: true

- name: Execute elastic upgrade
  ansible.builtin.debug:
    msg: >-
      Rolling upgrade of Elasticsearch cluster.
      Target: {{ elastic_upgrade_host }}
