
---
# Integration tests for stevefulme1.elastic._logstash_pipeline
#
# These tests verify full CRUD lifecycle with idempotency and check_mode.
# A live API endpoint is required.

- name: Set test variables
  ansible.builtin.set_fact:
    test__logstash_pipeline_params:


      description: "{{ test_description | default("test_description_value") }}"



      last_modified: "{{ test_last_modified | default("test_last_modified_value") }}"



      pipeline: "{{ test_pipeline | default("test_pipeline_value") }}"



      pipeline_metadata: "{{ test_pipeline_metadata | default("test_pipeline_metadata_value") }}"



      pipeline_settings: "{{ test_pipeline_settings | default("test_pipeline_settings_value") }}"



      username: "{{ test_username | default("test_username_value") }}"



# ============================================================
# CREATE - check mode
# ============================================================
- name: Create _logstash_pipeline (check mode)
  stevefulme1.elastic._logstash_pipeline:
    "{{ test__logstash_pipeline_params }}"

    state: present
  check_mode: true
  register: create_check

- name: Assert create in check mode reports changed
  ansible.builtin.assert:
    that:
      - create_check is changed
    fail_msg: "Create in check mode should report changed=true"

- name: Verify _logstash_pipeline was NOT actually created (check mode)
  stevefulme1.elastic._logstash_pipeline_info:













  register: check_verify

- name: Assert resource does not exist after check mode create
  ansible.builtin.assert:
    that:
      - check_verify._logstash_pipelines | length == 0
    fail_msg: "Resource should not exist after check mode create"

# ============================================================
# CREATE - real
# ============================================================
- name: Create _logstash_pipeline
  stevefulme1.elastic._logstash_pipeline:
    "{{ test__logstash_pipeline_params }}"

    state: present
  register: create_result

- name: Assert create reports changed
  ansible.builtin.assert:
    that:
      - create_result is changed
    fail_msg: "Create should report changed=true"

- name: Record created resource identifier
  ansible.builtin.set_fact:
    created_id: "{{ create_result.id }}"

# ============================================================
# CREATE - idempotency
# ============================================================
- name: Create _logstash_pipeline again (idempotency)
  stevefulme1.elastic._logstash_pipeline:
    "{{ test__logstash_pipeline_params }}"

    state: present
  register: create_idempotent

- name: Assert create is idempotent
  ansible.builtin.assert:
    that:
      - create_idempotent is not changed
    fail_msg: "Repeated create with same params should report changed=false"

# ============================================================
# READ - verify created resource
# ============================================================
- name: Get _logstash_pipeline info
  stevefulme1.elastic._logstash_pipeline_info:
    id: "{{ created_id }}"
  register: info_result

- name: Assert resource exists and has expected data
  ansible.builtin.assert:
    that:
      - info_result._logstash_pipelines | length == 1


      - info_result._logstash_pipelines[0].description == test__logstash_pipeline_params.description



      - info_result._logstash_pipelines[0].last_modified == test__logstash_pipeline_params.last_modified



      - info_result._logstash_pipelines[0].pipeline == test__logstash_pipeline_params.pipeline



      - info_result._logstash_pipelines[0].pipeline_metadata == test__logstash_pipeline_params.pipeline_metadata



      - info_result._logstash_pipelines[0].pipeline_settings == test__logstash_pipeline_params.pipeline_settings



      - info_result._logstash_pipelines[0].username == test__logstash_pipeline_params.username


    fail_msg: "Created resource does not match expected values"

# ============================================================
# UPDATE
# ============================================================















# No optional string parameters available for update testing.
# Update idempotency tests are skipped for this resource.


# ============================================================
# DELETE - check mode
# ============================================================
- name: Delete _logstash_pipeline (check mode)
  stevefulme1.elastic._logstash_pipeline:
    id: "{{ created_id }}"
    state: absent
  check_mode: true
  register: delete_check

- name: Assert delete in check mode reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed
    fail_msg: "Delete in check mode should report changed=true"

- name: Verify _logstash_pipeline still exists after check mode delete
  stevefulme1.elastic._logstash_pipeline_info:
    id: "{{ created_id }}"
  register: delete_check_verify

- name: Assert resource still exists after check mode delete
  ansible.builtin.assert:
    that:
      - delete_check_verify._logstash_pipelines | length == 1
    fail_msg: "Resource should still exist after check mode delete"

# ============================================================
# DELETE - real
# ============================================================
- name: Delete _logstash_pipeline
  stevefulme1.elastic._logstash_pipeline:
    id: "{{ created_id }}"
    state: absent
  register: delete_result

- name: Assert delete reports changed
  ansible.builtin.assert:
    that:
      - delete_result is changed
    fail_msg: "Delete should report changed=true"

# ============================================================
# DELETE - idempotency
# ============================================================
- name: Delete _logstash_pipeline again (idempotency)
  stevefulme1.elastic._logstash_pipeline:
    id: "{{ created_id }}"
    state: absent
  register: delete_idempotent

- name: Assert delete is idempotent
  ansible.builtin.assert:
    that:
      - delete_idempotent is not changed
    fail_msg: "Repeated delete should report changed=false"
