---
# Integration tests for stevefulme1.elastic.fleet_server_host
# These tests verify full CRUD lifecycle with idempotency and check_mode.
# A live Kibana endpoint is required.
- name: Set test variables
  ansible.builtin.set_fact:
    test_host_name: "Integration Test Fleet Server Host"
    test_host_urls:
      - "https://fleet-test:8220"
# ============================================================
# CREATE - check mode
# ============================================================
- name: Create fleet_server_host (check mode)
  stevefulme1.elastic.fleet_server_host:
    name: "{{ test_host_name }}"
    host_urls: "{{ test_host_urls }}"
    is_default: false
    state: present
  check_mode: true
  register: create_check
- name: Assert create in check mode reports changed
  ansible.builtin.assert:
    that:
      - create_check is changed
    fail_msg: "Create in check mode should report changed=true"
# ============================================================
# CREATE - real
# ============================================================
- name: Create fleet_server_host
  stevefulme1.elastic.fleet_server_host:
    name: "{{ test_host_name }}"
    host_urls: "{{ test_host_urls }}"
    is_default: false
    state: present
  register: create_result
- name: Assert create reports changed
  ansible.builtin.assert:
    that:
      - create_result is changed
    fail_msg: "Create should report changed=true"
- name: Record created resource identifier
  ansible.builtin.set_fact:
    created_host_id: "{{ create_result.server_host.id }}"
# ============================================================
# CREATE - idempotency
# ============================================================
- name: Create fleet_server_host again (idempotency)
  stevefulme1.elastic.fleet_server_host:
    host_id: "{{ created_host_id }}"
    name: "{{ test_host_name }}"
    host_urls: "{{ test_host_urls }}"
    is_default: false
    state: present
  register: create_idempotent
- name: Assert create is idempotent
  ansible.builtin.assert:
    that:
      - create_idempotent is not changed
    fail_msg: "Repeated create with same params should report changed=false"
# ============================================================
# READ - verify created resource
# ============================================================
- name: Get fleet_server_host info
  stevefulme1.elastic.fleet_server_host_info:
    host_id: "{{ created_host_id }}"
  register: info_result
- name: Assert resource exists
  ansible.builtin.assert:
    that:
      - info_result.fleet_server_hosts | length == 1
      - info_result.fleet_server_hosts[0].name == test_host_name
    fail_msg: "Created resource does not match expected values"
# ============================================================
# UPDATE
# ============================================================
- name: Update fleet_server_host
  stevefulme1.elastic.fleet_server_host:
    host_id: "{{ created_host_id }}"
    name: "Integration Test Fleet Server Host Updated"
    host_urls: "{{ test_host_urls }}"
    state: present
  register: update_result
- name: Assert update reports changed
  ansible.builtin.assert:
    that:
      - update_result is changed
    fail_msg: "Update should report changed=true"
# UPDATE - idempotency
- name: Update fleet_server_host again (idempotency)
  stevefulme1.elastic.fleet_server_host:
    host_id: "{{ created_host_id }}"
    name: "Integration Test Fleet Server Host Updated"
    host_urls: "{{ test_host_urls }}"
    state: present
  register: update_idempotent
- name: Assert update is idempotent
  ansible.builtin.assert:
    that:
      - update_idempotent is not changed
    fail_msg: "Repeated update with same params should report changed=false"
# ============================================================
# DELETE - check mode
# ============================================================
- name: Delete fleet_server_host (check mode)
  stevefulme1.elastic.fleet_server_host:
    host_id: "{{ created_host_id }}"
    name: "Integration Test Fleet Server Host Updated"
    state: absent
  check_mode: true
  register: delete_check
- name: Assert delete in check mode reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed
    fail_msg: "Delete in check mode should report changed=true"
- name: Verify fleet_server_host still exists after check mode delete
  stevefulme1.elastic.fleet_server_host_info:
    host_id: "{{ created_host_id }}"
  register: delete_check_verify
- name: Assert resource still exists after check mode delete
  ansible.builtin.assert:
    that:
      - delete_check_verify.fleet_server_hosts | length == 1
    fail_msg: "Resource should still exist after check mode delete"
# ============================================================
# DELETE - real
# ============================================================
- name: Delete fleet_server_host
  stevefulme1.elastic.fleet_server_host:
    host_id: "{{ created_host_id }}"
    name: "Integration Test Fleet Server Host Updated"
    state: absent
  register: delete_result
- name: Assert delete reports changed
  ansible.builtin.assert:
    that:
      - delete_result is changed
    fail_msg: "Delete should report changed=true"
# DELETE - idempotency
- name: Delete fleet_server_host again (idempotency)
  stevefulme1.elastic.fleet_server_host:
    host_id: "{{ created_host_id }}"
    name: "Integration Test Fleet Server Host Updated"
    state: absent
  register: delete_idempotent
- name: Assert delete is idempotent
  ansible.builtin.assert:
    that:
      - delete_idempotent is not changed
    fail_msg: "Repeated delete should report changed=false"
