---
# Integration tests for stevefulme1.elastic.fleet_enrollment_key
# These tests verify create and delete lifecycle with idempotency and check_mode.
# Enrollment keys cannot be updated -- only create and delete.
# A live Kibana endpoint is required.
# NOTE: Requires an existing agent policy. Creates one first.
- name: Set test variables
  ansible.builtin.set_fact:
    test_agent_policy_name: "Integration Test Agent Policy for Keys"
    test_key_name: "Integration Test Enrollment Key"
# ============================================================
# SETUP - Create agent policy for enrollment key
# ============================================================
- name: Create agent policy for enrollment key tests
  stevefulme1.elastic.fleet_agent_policy:
    name: "{{ test_agent_policy_name }}"
    namespace: "default"
    state: present
  register: agent_policy_result
- name: Record agent policy ID
  ansible.builtin.set_fact:
    test_agent_policy_id: "{{ agent_policy_result.policy.id }}"
# ============================================================
# CREATE - check mode
# ============================================================
- name: Create fleet_enrollment_key (check mode)
  stevefulme1.elastic.fleet_enrollment_key:
    name: "{{ test_key_name }}"
    policy_id: "{{ test_agent_policy_id }}"
    state: present
  check_mode: true
  register: create_check
- name: Assert create in check mode reports changed
  ansible.builtin.assert:
    that:
      - create_check is changed
    fail_msg: "Create in check mode should report changed=true"
# ============================================================
# CREATE - real
# ============================================================
- name: Create fleet_enrollment_key
  stevefulme1.elastic.fleet_enrollment_key:
    name: "{{ test_key_name }}"
    policy_id: "{{ test_agent_policy_id }}"
    state: present
  register: create_result
- name: Assert create reports changed
  ansible.builtin.assert:
    that:
      - create_result is changed
    fail_msg: "Create should report changed=true"
- name: Record created resource identifier
  ansible.builtin.set_fact:
    created_key_id: "{{ create_result.enrollment_key.id }}"
# ============================================================
# CREATE - idempotency (enrollment keys are create-only)
# ============================================================
- name: Create fleet_enrollment_key again (idempotency)
  stevefulme1.elastic.fleet_enrollment_key:
    key_id: "{{ created_key_id }}"
    name: "{{ test_key_name }}"
    policy_id: "{{ test_agent_policy_id }}"
    state: present
  register: create_idempotent
- name: Assert create is idempotent
  ansible.builtin.assert:
    that:
      - create_idempotent is not changed
    fail_msg: "Repeated create with same params should report changed=false"
# ============================================================
# READ - verify created resource
# ============================================================
- name: Get fleet_enrollment_key info
  stevefulme1.elastic.fleet_enrollment_key_info:
    key_id: "{{ created_key_id }}"
  register: info_result
- name: Assert resource exists
  ansible.builtin.assert:
    that:
      - info_result.fleet_enrollment_keys | length == 1
    fail_msg: "Created resource does not match expected values"
# ============================================================
# DELETE - check mode
# ============================================================
- name: Delete fleet_enrollment_key (check mode)
  stevefulme1.elastic.fleet_enrollment_key:
    key_id: "{{ created_key_id }}"
    state: absent
  check_mode: true
  register: delete_check
- name: Assert delete in check mode reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed
    fail_msg: "Delete in check mode should report changed=true"
- name: Verify fleet_enrollment_key still exists after check mode delete
  stevefulme1.elastic.fleet_enrollment_key_info:
    key_id: "{{ created_key_id }}"
  register: delete_check_verify
- name: Assert resource still exists after check mode delete
  ansible.builtin.assert:
    that:
      - delete_check_verify.fleet_enrollment_keys | length == 1
    fail_msg: "Resource should still exist after check mode delete"
# ============================================================
# DELETE - real
# ============================================================
- name: Delete fleet_enrollment_key
  stevefulme1.elastic.fleet_enrollment_key:
    key_id: "{{ created_key_id }}"
    state: absent
  register: delete_result
- name: Assert delete reports changed
  ansible.builtin.assert:
    that:
      - delete_result is changed
    fail_msg: "Delete should report changed=true"
# DELETE - idempotency
- name: Delete fleet_enrollment_key again (idempotency)
  stevefulme1.elastic.fleet_enrollment_key:
    key_id: "{{ created_key_id }}"
    state: absent
  register: delete_idempotent
- name: Assert delete is idempotent
  ansible.builtin.assert:
    that:
      - delete_idempotent is not changed
    fail_msg: "Repeated delete should report changed=false"
# ============================================================
# TEARDOWN - Remove agent policy
# ============================================================
- name: Delete agent policy used for tests
  stevefulme1.elastic.fleet_agent_policy:
    policy_id: "{{ test_agent_policy_id }}"
    name: "{{ test_agent_policy_name }}"
    state: absent
