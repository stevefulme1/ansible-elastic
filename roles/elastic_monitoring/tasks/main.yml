---
# tasks/main.yml for elastic_monitoring
# Configure Stack monitoring and alerting

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - elastic_monitoring_host is defined
    fail_msg: "elastic_monitoring_host must be defined"
    quiet: true

- name: Execute elastic monitoring
  ansible.builtin.debug:
    msg: >-
      Configure Stack monitoring and alerting.
      Target: {{ elastic_monitoring_host }}
