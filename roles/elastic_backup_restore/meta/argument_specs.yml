---
argument_specs:
  main:
    short_description: "Configure snapshot repositories and restore"
    options:
      elastic_backup_restore_host:
        description: Target host address
        type: str
        required: true
      elastic_backup_restore_username:
        description: Authentication username
        type: str
      elastic_backup_restore_password:
        description: Authentication password
        type: str
        no_log: true
      elastic_backup_restore_api_key:
        description: API key for authentication
        type: str
        no_log: true
      elastic_backup_restore_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      elastic_backup_restore_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
