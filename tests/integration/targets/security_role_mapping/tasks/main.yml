---
# Integration tests for stevefulme1.elastic.security_role_mapping
# These tests verify full CRUD lifecycle with idempotency and check_mode.
# A live Elasticsearch endpoint with security enabled is required.
- name: Set test variables
  ansible.builtin.set_fact:
    test_mapping_name: "integration_test_mapping"
    test_mapping_params:
      state: present
      name: "integration_test_mapping"
      roles:
        - viewer
      enabled: true
      rules:
        field:
          username: "*"
      metadata:
        purpose: "integration_test"
# ============================================================
# CREATE - check mode
# ============================================================
- name: Create security role mapping (check mode)
  stevefulme1.elastic.security_role_mapping: "{{ test_mapping_params }}"
  check_mode: true
  register: create_check
- name: Assert create in check mode reports changed
  ansible.builtin.assert:
    that:
      - create_check is changed
    fail_msg: "Create in check mode should report changed=true"
# ============================================================
# CREATE - real
# ============================================================
- name: Create security role mapping
  stevefulme1.elastic.security_role_mapping: "{{ test_mapping_params }}"
  register: create_result
- name: Assert create reports changed
  ansible.builtin.assert:
    that:
      - create_result is changed
    fail_msg: "Create should report changed=true"
# ============================================================
# CREATE - idempotency
# ============================================================
- name: Create security role mapping again (idempotency)
  stevefulme1.elastic.security_role_mapping: "{{ test_mapping_params }}"
  register: create_idempotent
- name: Assert create is idempotent
  ansible.builtin.assert:
    that:
      - create_idempotent is not changed
    fail_msg: "Repeated create with same params should report changed=false"
# ============================================================
# READ - verify created resource
# ============================================================
- name: Get security role mapping info
  stevefulme1.elastic.security_role_mapping_info:
    name: "{{ test_mapping_name }}"
  register: info_result
- name: Assert resource exists
  ansible.builtin.assert:
    that:
      - info_result.security_role_mappings | length == 1
      - info_result.security_role_mappings[0].name == test_mapping_name
      - info_result.security_role_mappings[0].roles == ["viewer"]
    fail_msg: "Created resource does not match expected values"
# ============================================================
# UPDATE
# ============================================================
- name: Update security role mapping
  stevefulme1.elastic.security_role_mapping:
    name: "{{ test_mapping_name }}"
    roles:
      - viewer
      - editor
    enabled: true
    rules:
      field:
        username: "*"
    state: present
  register: update_result
- name: Assert update reports changed
  ansible.builtin.assert:
    that:
      - update_result is changed
    fail_msg: "Update should report changed=true"
# UPDATE - idempotency
- name: Update security role mapping again (idempotency)
  stevefulme1.elastic.security_role_mapping:
    name: "{{ test_mapping_name }}"
    roles:
      - viewer
      - editor
    enabled: true
    rules:
      field:
        username: "*"
    state: present
  register: update_idempotent
- name: Assert update is idempotent
  ansible.builtin.assert:
    that:
      - update_idempotent is not changed
    fail_msg: "Repeated update with same params should report changed=false"
# ============================================================
# DELETE - check mode
# ============================================================
- name: Delete security role mapping (check mode)
  stevefulme1.elastic.security_role_mapping:
    name: "{{ test_mapping_name }}"
    state: absent
  check_mode: true
  register: delete_check
- name: Assert delete in check mode reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed
    fail_msg: "Delete in check mode should report changed=true"
- name: Verify security role mapping still exists after check mode delete
  stevefulme1.elastic.security_role_mapping_info:
    name: "{{ test_mapping_name }}"
  register: delete_check_verify
- name: Assert resource still exists after check mode delete
  ansible.builtin.assert:
    that:
      - delete_check_verify.security_role_mappings | length == 1
    fail_msg: "Resource should still exist after check mode delete"
# ============================================================
# DELETE - real
# ============================================================
- name: Delete security role mapping
  stevefulme1.elastic.security_role_mapping:
    name: "{{ test_mapping_name }}"
    state: absent
  register: delete_result
- name: Assert delete reports changed
  ansible.builtin.assert:
    that:
      - delete_result is changed
    fail_msg: "Delete should report changed=true"
# DELETE - idempotency
- name: Delete security role mapping again (idempotency)
  stevefulme1.elastic.security_role_mapping:
    name: "{{ test_mapping_name }}"
    state: absent
  register: delete_idempotent
- name: Assert delete is idempotent
  ansible.builtin.assert:
    that:
      - delete_idempotent is not changed
    fail_msg: "Repeated delete should report changed=false"
